listen=YES
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022
use_localtime=YES

# save file transfer logs to /var/log/vsftpd.log
xferlog_enable=YES

chroot_local_user=YES
secure_chroot_dir=/var/run/vsftpd/empty
pam_service_name=vsftpd
allow_writeable_chroot=YES
seccomp_sandbox=NO

pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110
pasv_address=$(DOMAIN_NAME)